<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu bài tập trực tuyến</title>

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #d9ecff; /* nền xanh dương nhạt */
    margin: 0;
    padding: 0;
}

/* Khung chính */
.container {
    width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 20px;

    border: 4px solid red; /* viền đỏ */
    border-radius: 10px;
}

/* Tiêu đề */
h1 {
    text-align: center;
    color: #003366;

    border-bottom: 3px solid red;
    padding-bottom: 10px;
}

/* Mỗi mục */
.item {
    border: 2px solid red; /* viền đỏ từng mục */
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;

    background-color: #f5faff;
}

.item h3 {
    margin-top: 0;
    color: #003366;
}

/* Ô mô tả */
textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
    padding: 5px;
    font-size: 14px;

    border: 1px solid red;
}

/* Nút chọn file */
input[type="file"] {
    margin-top: 10px;
}

/* Hiển thị ảnh */
.preview {
    margin-top: 10px;
}

.preview img {
    max-width: 200px;
    border-radius: 5px;
    border: 2px solid red;
}

/* Nút */
.button-area {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;

    background-color: red;
    color: white;

    border: none;
    border-radius: 8px;

    cursor: pointer;
}

button:hover {
    background-color: darkred;
}

/* Khi in */
@media print {

    button {
        display: none;
    }

    input[type="file"] {
        display: none;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>Phiếu bài tập trực tuyến</h1>

<!-- MỤC 1 -->
<div class="item">

<h3>Mục 1</h3>

<input type="file"
accept="image/*"
onchange="loadImage(event, 'img1')">

<div class="preview">
<img id="img1">
</div>

<textarea placeholder="Nhập mô tả cho hình ảnh..."></textarea>

</div>

<!-- MỤC 2 -->
<div class="item">

<h3>Mục 2</h3>

<input type="file"
accept="image/*"
onchange="loadImage(event, 'img2')">

<div class="preview">
<img id="img2">
</div>

<textarea placeholder="Nhập mô tả cho hình ảnh..."></textarea>

</div>

<!-- MỤC 3 -->
<div class="item">

<h3>Mục 3</h3>

<input type="file"
accept="image/*"
onchange="loadImage(event, 'img3')">

<div class="preview">
<img id="img3">
</div>

<textarea placeholder="Nhập mô tả cho hình ảnh..."></textarea>

</div>

<!-- MỤC 4 -->
<div class="item">

<h3>Mục 4</h3>

<input type="file"
accept="image/*"
onchange="loadImage(event, 'img4')">

<div class="preview">
<img id="img4">
</div>

<textarea placeholder="Nhập mô tả cho hình ảnh..."></textarea>

</div>

<!-- MỤC 5 -->
<div class="item">

<h3>Mục 5</h3>

<input type="file"
accept="image/*"
onchange="loadImage(event, 'img5')">

<div class="preview">
<img id="img5">
</div>

<textarea placeholder="Nhập mô tả cho hình ảnh..."></textarea>

</div>

<!-- NÚT IN -->

<div class="button-area">

<button onclick="window.print()">
🖨️ In phiếu bài tập

</button>

</div>

</div>

<script>

/* Hiển thị ảnh khi chọn */

function loadImage(event, id) {

    let img = document.getElementById(id);

    img.src = URL.createObjectURL(event.target.files[0]);

}

</script>

</body>
</html>
